<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="./styles.css">
  </head>

  <body>
    <header>
      <h1 id="title">freeCodeCamp Survey Form</h1>
      <p id="description">Thank you for taking the time to help us improve the platform</p>
    </header>
    <main>
      <form id="survey-form">
        <section>
          <label for="name" id="name-label">Name: </label>
          <input required id="name" type="text" placeholder="Enter your name" name="name">
          <label for="email" id="email-label">Email: </label>
          <input required id="email" type="email" placeholder="Enter your email" name="email">
          <label for="number" id="number-label">Age (optional): </label>
          <input type="number" id="number" min="3" max="120" placeholder="Age" name="age">
        </section>
        <section>
          <label for="dropdown">Which option best describes your current role?</label>
          <select id="dropdown" name="role">
            <option value="" selected disabled>Select current role</option>
            <option value="student">Student</option>
            <option value="full-time-job">Full Time Job</option>
            <option value="prefer-not-to-say">Prefer Not To Say</option>
            <option value="other">Other</option>
          </select>
        </section>
        <section>
          <label>Would you recommend freeCodeCamp to a friend?</label>
          <div class="radio-group">
            <input checked id="definitely" type="radio" name="opinion" value="definitely">
            <label for="definitely">Definitely</label>
          </div>
          <div class="radio-group">
            <input id="maybe" type="radio" name="opinion" value="maybe">
            <label for="maybe">Maybe</label>
          </div>
          <div class="radio-group">
            <input id="no" type="radio" name="opinion" value="no">
            <label for="no">No</label>
          </div>
        </section>
        <section>
          <label>What is your favorite feature of freeCodeCamp?</label>
          <div class="checkbox-group">
            <input type="checkbox" id="challenges" name="favorite-feature" value="challenges">
          <label for="challenges">Challenges</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="projects" name="favorite-feature" value="projects">
            <label for="projects">Projects</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="community" name="favorite-feature" value="community">
            <label for="community">Community</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="open-source" name="favorite-feature" value="open-source">
          <label for="open-source">Open Source</label>
          </div>
        </section>
        <section>
          <label for="comments">Any comments or suggestions?</label>
          <textarea id="comments" name="comments" rows="5" cols="50" placeholder="Enter your comment here.."></textarea>
        </section>
        <button type="submit" id="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
